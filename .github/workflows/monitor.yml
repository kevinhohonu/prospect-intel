name: Opportunity Monitor

on:
  schedule:
    # 13:00 UTC = 09:00 ET / 06:00 PT — fresh candidate set ready by morning standup
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write   # so we can commit updated seen_ids.json + audit log back

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m src.monitor.main

      - name: Commit state
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          # Note: do NOT add logs/ to the commit — exceptions from third-party
          # libraries (e.g. `requests` HTTPError) can include URLs with secrets,
          # and those bytes leaking into a repo file fail GitHub push protection
          # (and would be a real exposure). Logs are uploaded as a workflow
          # artifact below instead.
          git add -f data/state/ data/outputs/ || true
          git diff --cached --quiet || git commit -m "monitor: $(date -u +%Y-%m-%dT%H:%MZ) state update"
          git push

      - name: Upload run logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
